name: studio_pair
description: Studio Pair - Collaborative life management for small groups
version: 0.1.0+1
publish_to: none

environment:
  sdk: ^3.8.0
  flutter: '>=3.29.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^17.1.0

  # Local Database (Drift/SQLite for offline-first)
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.41
  path_provider: ^2.1.1
  path: ^1.8.3

  # Networking
  dio: ^5.4.0
  web_socket_channel: ^3.0.3
  connectivity_plus: ^6.1.5

  # Storage & Security
  flutter_secure_storage: ^10.0.0

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9

  # Utilities
  intl: any
  uuid: ^4.5.3
  json_annotation: ^4.11.0
  timeago: ^3.6.1
  url_launcher: ^6.2.2
  share_plus: ^10.0.0
  image_picker: ^1.0.5

  # Charts
  fl_chart: ^1.1.1

  # Maps & Location
  geolocator: ^10.1.0

  # Barcode
  mobile_scanner: ^7.2.0

  # In-App Purchases
  in_app_purchase: ^3.2.0

  # Preferences
  shared_preferences: ^2.2.2

  # Logging
  logging: ^1.3.0

  # Encryption
  pointycastle: ^4.0.0

  # Health
  health: ^13.1.4

  # Push Notifications
  firebase_core: ^2.25.4
  firebase_messaging: ^14.7.15

  # Shared package
  studio_pair_shared:
    path: ../shared

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  json_serializable: ^6.13.0
  drift_dev: ^2.14.1
  flutter_lints: ^6.0.0
  mockito: ^5.4.3
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#5C6BC0"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/i18n/

  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Regular.ttf
