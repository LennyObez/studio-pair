name: Feature Request
description: Suggest an idea for Studio Pair
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: A clear description of the problem or need this feature addresses.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear description of what you'd like to happen.
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which module does this relate to?
      options:
        - Dashboard
        - Activities
        - Calendar
        - Messaging
        - Tasks
        - Finances
        - Cards
        - Vault
        - Health
        - Reminders
        - Files
        - Memories
        - Charter
        - Grocery List
        - Polls
        - Location
        - Sync Engine
        - New Module
        - Cross-cutting
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or screenshots about the feature request.
    validations:
      required: false
