name: Bug Report
description: Create a report to help us improve Studio Pair
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which module is affected?
      options:
        - Dashboard
        - Activities
        - Calendar
        - Messaging
        - Tasks
        - Finances
        - Cards
        - Vault
        - Health
        - Reminders
        - Files
        - Memories
        - Charter
        - Grocery List
        - Polls
        - Location
        - Authentication
        - Sync Engine
        - Other
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      description: "e.g., iPhone 15, Pixel 8, Samsung S24"
      placeholder: "iPhone 15"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - iOS
        - Android
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS Version
      description: "e.g., iOS 17.2, Android 14"
      placeholder: "iOS 17.2"
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App Version
      description: "e.g., 0.1.0"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
    validations:
      required: false
